spring:
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://localhost:33066/joyshot_db?serverTimezone=GMT%2b8
    username: root
    password: CHANGE_ME_DB_PASSWORD

line:
  callback-url: https://joyshotadmin.stagingsite.vip/api/line/callback
  client-id: CHANGE_ME_LINE_CLIENT_ID
  client-secret: CHANGE_ME_LINE_CLIENT_SECRET
  message-root-url: https://joyshotadmin.stagingsite.vip
  image-url: http://image.stagingsite.vip/

google:
  oauth:
