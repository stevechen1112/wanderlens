      uri: https://joyshotadmin.stagingsite.vip/api/googledrive/oauth
  credentials:
    folder:
      path: file:/var/www/credentials
  parent:
    folderId: CHANGE_ME_GOOGLE_DRIVE_FOLDER_ID
  secret:
    key:
      path: classpath:keys/secret_test.json

order:
  paid: "【JoyShot隨行拍攝-staging】"

