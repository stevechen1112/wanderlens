server:
  port: 7272

spring:
  profiles:
    active: prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/joyshot_db?serverTimezone=GMT%2b8
    username: root
    password: CHANGE_ME_DB_PASSWORD
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    protocol: smtp
    host: mail.joyshot.app
    port: 587
    username: service@joyshot.app
    password: CHANGE_ME_SMTP_PASSWORD
    properties:
      mail:
        smtp:
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 5000
          auth: true
          starttls:
            enable: true
            required: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-prefix: lh_

line:
  oauth-token-url: https://notify-bot.line.me/oauth/token
  notify-url: https://notify-api.line.me/api/notify

google:
  map-api-key: CHANGE_ME_GOOGLE_MAPS_API_KEY
  map-api-lang: zh-TW

logging:
  level:
    root: INFO

file:
  upload-location: /var/www/joyshot-uploads/

bypass: houtest9999

sms:
  url: https://smsapi.mitake.com.tw/api/mtk/SmSend?
  username: CHANGE_ME_SMS_USERNAME
  password: CHANGE_ME_SMS_PASSWORD

twillio:
  account-sid: CHANGE_ME_TWILIO_ACCOUNT_SID
  auth-token: CHANGE_ME_TWILIO_AUTH_TOKEN
  phone-from: +10000000000
