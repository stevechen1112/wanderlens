name: CI - wanderlens-media

on:
  pull_request:
    paths:
      - 'wanderlens-media/**'
  push:
    branches: [main]
    paths:
      - 'wanderlens-media/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: wanderlens-media/requirements.txt

      - name: Install dependencies
        working-directory: wanderlens-media
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        working-directory: wanderlens-media
        run: pytest