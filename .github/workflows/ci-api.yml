name: CI - wanderlens-api

on:
  pull_request:
    paths:
      - 'wanderlens-api/**'
  push:
    branches: [main]
    paths:
      - 'wanderlens-api/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: wanderlens-api
        run: mvn -B clean package -DskipTests

      - name: Run tests
        working-directory: wanderlens-api
        run: mvn test