# 開發環境

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:wanderlens_db}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:wanderlens}
    password: ${MYSQL_PASSWORD:wanderlens_dev_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:wanderlens_redis_2026}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    com.wanderlens.api: DEBUG
    org.springframework.security: DEBUG

# JWT（開發環境預設密鑰，正式環境必須透過環境變數設定）
jwt:
  secret: ${API_JWT_SECRET:wanderlens-dev-jwt-secret-key-2026}
  expiration: ${API_JWT_EXPIRATION:28800}

wanderlens:
  staging:
    payment-simulate-enabled: true