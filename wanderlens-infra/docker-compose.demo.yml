# Demo / production overlay for wanderlenstw.com
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --profile full --profile demo up -d

services:
  api:
    environment:
      FRONTEND_WEB_URL: https://www.wanderlenstw.com
      ECPAY_RETURN_URL: https://api.wanderlenstw.com/api/payment/ecpay/callback

  web:
    environment:
      NUXT_PUBLIC_API_BASE: https://api.wanderlenstw.com/api

  retouch:
    image: node:22-alpine
    container_name: wanderlens-retouch
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3005"
    volumes:
      - ../wanderlens-retouch:/app
    networks:
      - wanderlens-net
    profiles: ["demo"]

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/wanderlenstw/nginx:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/wanderlenstw/static/app-web:/usr/share/nginx/app-web:ro
      - ./deploy/wanderlenstw/static/papp-web:/usr/share/nginx/papp-web:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - provider
      - admin
      - retouch
    profiles: ["full", "nginx", "demo"]

volumes:
  certbot-webroot:
