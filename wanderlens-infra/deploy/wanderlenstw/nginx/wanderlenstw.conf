# WanderLens demo/production — wanderlenstw.com
# SSL 憑證路徑由 certbot 寫入 /etc/letsencrypt/live/wanderlenstw.com/
# 首次部署見 deploy/wanderlenstw/README.md

# ── HTTP → HTTPS ──
server {
    listen 80;
    server_name wanderlenstw.com www.wanderlenstw.com api.wanderlenstw.com
                provider.wanderlenstw.com admin.wanderlenstw.com retouch.wanderlenstw.com
                app.wanderlenstw.com papp.wanderlenstw.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── 根網域 → www ──
server {
    listen 443 ssl http2;
    server_name wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;
    return 301 https://www.wanderlenstw.com$request_uri;
}

# ── API ──
server {
    listen 443 ssl http2;
    server_name api.wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        return 404;
    }
}

# ── 消費者 Web (Nuxt) ──
server {
    listen 443 ssl http2;
    server_name www.wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;

    location / {
        proxy_pass http://web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 攝影師 Web ──
server {
    listen 443 ssl http2;
    server_name provider.wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /media/ {
        proxy_pass http://media:3004/;
        proxy_set_header Host $host;
        client_max_body_size 500m;
        proxy_request_buffering off;
    }
    location / {
        proxy_pass http://provider:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 營運後台 ──
