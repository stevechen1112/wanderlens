# ── 消費者 App（Expo Web 靜態）──
server {
    listen 443 ssl http2;
    server_name app.wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;

    root /usr/share/nginx/app-web;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── 攝影師 App（Expo Web 靜態）──
server {
    listen 443 ssl http2;
    server_name papp.wanderlenstw.com;
    ssl_certificate     /etc/letsencrypt/live/wanderlenstw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderlenstw.com/privkey.pem;

    root /usr/share/nginx/papp-web;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
