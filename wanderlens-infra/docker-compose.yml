version: "3.9"

# WanderLens 開發環境 Docker Compose
# 一鍵啟動所有基礎服務 + 應用服務
# 使用方式：docker compose up -d

services:
  # ──────────────────────────────────────────────
  # 基礎服務
  # ──────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: wanderlens-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"  # 僅綁定 localhost，不對外暴露
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wanderlens_db}
      MYSQL_USER: ${MYSQL_USER:-wanderlens}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Taipei
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - wanderlens-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wanderlens-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # 僅綁定 localhost
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - wanderlens-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest  # 使用最新版
    container_name: wanderlens-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"  # Console 僅綁定 localhost
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wanderlens}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - wanderlens-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 應用服務（開發時按需啟動）
  # ──────────────────────────────────────────────

  api:
    build:
      context: ../wanderlens-api
      dockerfile: Dockerfile
    container_name: wanderlens-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-wanderlens_db}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Taipei
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-wanderlens}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-wanderlens123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-wanderlens}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MEDIA_SERVICE_API_KEY: ${MEDIA_SERVICE_API_KEY:-wanderlens-media-service-key-2026}
      ECPAY_MERCHANT_ID: ${ECPAY_MERCHANT_ID:-3002607}
      ECPAY_HASH_KEY: ${ECPAY_HASH_KEY:-pwFHCqoQZGmho4w6}
      ECPAY_HASH_IV: ${ECPAY_HASH_IV:-EkRm7iFT261dpevs}
      ECPAY_MODE: ${ECPAY_MODE:-Test}
      ECPAY_RETURN_URL: ${ECPAY_RETURN_URL:-http://localhost:8080/api/payment/ecpay/callback}
      FRONTEND_WEB_URL: ${FRONTEND_WEB_URL:-http://localhost:3001}
      STAGING_PAYMENT_SIMULATE: ${STAGING_PAYMENT_SIMULATE:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderlens-net
    profiles: ["full", "api", "web", "provider", "admin", "nginx", "media"]

  media:
    build:
      context: ../wanderlens-media
      dockerfile: docker/Dockerfile
    container_name: wanderlens-media
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-wanderlens}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-wanderlens123}
      API_BASE_URL: http://api:8080/api
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      MEDIA_SERVICE_API_KEY: ${MEDIA_SERVICE_API_KEY:-wanderlens-media-service-key-2026}
      API_JWT_SECRET: ${API_JWT_SECRET:-wanderlens-dev-jwt-secret-key-2026}
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderlens-net
    profiles: ["full", "media"]

  web:
    build:
      context: ../wanderlens-web
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: https://api.wanderlenstw.com/api
    container_name: wanderlens-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NUXT_PUBLIC_API_BASE: https://api.wanderlenstw.com/api
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      - api
    networks:
      - wanderlens-net
    profiles: ["full", "web"]

  provider:
    build:
      context: ../wanderlens-provider
      dockerfile: Dockerfile
    container_name: wanderlens-provider
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      VITE_API_BASE_URL: http://nginx/api
      VITE_MEDIA_BASE_URL: http://nginx/media
    depends_on:
      - api
    networks:
      - wanderlens-net
    profiles: ["full", "provider"]

  admin:
    build:
      context: ../wanderlens-admin
      dockerfile: Dockerfile
    container_name: wanderlens-admin
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      VITE_API_BASE_URL: http://nginx/api
    depends_on:
      - api
    networks:
      - wanderlens-net
    profiles: ["full", "admin"]

  # ──────────────────────────────────────────────
  # 反向代理
  # ──────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: wanderlens-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
    networks:
      - wanderlens-net
    profiles: ["full", "nginx"]

# ──────────────────────────────────────────────
# 網路與磁碟區
# ──────────────────────────────────────────────

networks:
  wanderlens-net:
    driver: bridge
    name: wanderlens-network

volumes:
  mysql_data:
    name: wanderlens-mysql-data
  redis_data:
    name: wanderlens-redis-data
  minio_data:
    name: wanderlens-minio-data